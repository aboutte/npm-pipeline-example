name: Update Service

on: 
  workflow_dispatch:
    inputs:
      image:
        description: The full image
        type: string
        required: true
      workspace:
        description: Workspace to run
        type: string
        required: true
        default: app01
  workflow_call:
    inputs:
      image:
        description: The full image
        required: true
        type: string
      workspace:
        description: Workspace to run
        type: string
        required: true
        default: app01
    secrets:
      DUPLO_TOKEN:
        description: The Duplo API token
        required: true


jobs:
  update_service:
    name: Update Service
    runs-on: ubuntu-latest
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: ${{ vars.DUPLO_HOST  }}
      DUPLO_TENANT: ${{ inputs.workspace }}
    steps: 
    - name: Duplo Setup
      uses: duplocloud/actions/setup@main

    - name: Update Service
      uses: duplocloud/actions/update-service@main
      with:
        service: frontend
        image: ${{ inputs.image }}