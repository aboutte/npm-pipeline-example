name: Build and Publish Images
on:
  workflow_dispatch: {}
  workflow_call: 
    outputs:
      image:
        description: The URI of the image
        value: ${{ jobs.build_image.outputs.image }}
    secrets:
      DUPLO_TOKEN:
        description: The token to use for Duplo API calls
        required: true

env:
  DUPLO_HOST: ${{ vars.DUPLO_HOST }}
  DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
  ECR_REGISTRY: "813590939111.dkr.ecr.us-west-2.amazonaws.com"


jobs:
  build_image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    outputs:
      image: ${{ steps.build_image.outputs.uri }}
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Duplo Setup
      uses: duplocloud/actions/setup@main

    - name: Build and Push Frontend Docker Image
      id: build_image
      uses: duplocloud/actions/build-image@main
      with:
        platforms: linux/amd64
        push: true
        registry: ${{ env.ECR_REGISTRY }}
        repo: "${{ vars.DUPLO_TENANT_BASE }}-prod-frontend"
        build-args: >
          name=${{ github.repository }}

    # - name: Build Lambda Function
    #   run: |
    #     cd lambda
    #     pip install -r requirements.txt --target ./package
    #     cd package
    #     zip -r ../my_deployment_package.zip .
    #     cd ..
    #     zip my_deployment_package.zip lambda_handler.py

    # - name: Upload Lambda Function
    #   run: |
    #     aws s3 cp my_deployment_package.zip s3://duploservices-app01-prod-search-813590939111/

    - name: Build Lambda Function
      run: |
        cd lambda
        docker build -t lambda .
        docker tag lambda:main ${{ env.ECR_REGISTRY }}/${{ vars.DUPLO_TENANT_BASE }}-prod-serverless:main
        docker push ${{ env.ECR_REGISTRY }}/${{ vars.DUPLO_TENANT_BASE }}-prod-serverless:main


